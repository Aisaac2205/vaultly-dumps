# openspec/config.yaml
schema: spec-driven

context: |
  pnpm monorepo (pnpm-workspace.yaml => apps/*)
  |-- apps/api  — NestJS 11, TypeORM, PostgreSQL, Better Auth, Swagger, Joi
  |-- apps/web  — React 19, React Router 7, Vite 6, Tailwind v4, TanStack Query 5
  TypeScript strict, conventional commits (no scopes), semantic-release on main.
  Cross-app contracts duplicated; backend enums are source of truth.
  No shared package.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  detected_at: "2026-06-13"
  runner:
    backend:
      command: "pnpm --filter @vaultly-control/api test"
      framework: jest
      configured: false
      notes: "Script exists but no jest config, no test files, no jest in dependencies — will fail"
    frontend:
      command: null
      framework: null
      configured: false
      notes: "No test framework installed or configured"
  layers:
    unit: false
    integration: false
    e2e: false
    tools: {}
  coverage: false
  quality:
    linter:
      available: true
      command: "pnpm lint"
      tool: "ESLint"
      notes: "Scripts reference eslint but no config file found — may need setup"
    type_checker:
      available: true
      command: "pnpm typecheck"
      tool: "tsc --noEmit"
      notes: "Per-package; strict mode enabled in tsconfig.base.json"
    formatter:
      available: false
      command: null
      tool: null
      notes: "No prettier or formatter configured"
