apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultly-control-api
  namespace: vaultly-control
  labels:
    app: vaultly-control-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultly-control-api
  template:
    metadata:
      labels:
        app: vaultly-control-api
    spec:
      containers:
        - name: api
          image: vaultly-control-api:latest
          # Change to Always in CI/CD pipelines; IfNotPresent is fine
          # for local development with minikube or kind.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vaultly-control-config
            - secretRef:
                name: vaultly-control-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      #
      # NOTE: The /health endpoint must be implemented in the NestJS API.
      # Recommended approach — add @nestjs/terminus:
      #
      #   pnpm add @nestjs/terminus
      #
      # Then create apps/api/src/health/health.controller.ts:
      #
      #   import { Controller, Get } from '@nestjs/common';
      #   import { HealthCheck, HealthCheckService } from '@nestjs/terminus';
      #
      #   @Controller('health')
      #   export class HealthController {
      #     constructor(private health: HealthCheckService) {}
      #
      #     @Get()
      #     @HealthCheck()
      #     check() {
      #       return this.health.check([]);
      #     }
      #   }
      #
      # And register HealthController + TerminusModule in AppModule.
      #
