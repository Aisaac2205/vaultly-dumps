apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultly-control-web
  namespace: vaultly-control
  labels:
    app: vaultly-control-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultly-control-web
  template:
    metadata:
      labels:
        app: vaultly-control-web
    spec:
      containers:
        - name: web
          image: vaultly-control-web:latest
          # Change to Always in CI/CD pipelines; IfNotPresent is fine
          # for local development with minikube or kind.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          # Runtime config: entrypoint.sh reads these env vars and writes
          # /usr/share/nginx/html/config.js before starting nginx.
          envFrom:
            - configMapRef:
                name: vaultly-control-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
