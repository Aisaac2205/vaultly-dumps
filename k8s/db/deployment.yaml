apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultly-control-db
  namespace: vaultly-control
  labels:
    app: vaultly-control-db
spec:
  # PostgreSQL does not scale horizontally in this setup.
  # For high availability, consider Patroni or a managed service.
  replicas: 1
  selector:
    matchLabels:
      app: vaultly-control-db
  template:
    metadata:
      labels:
        app: vaultly-control-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: vaultly-control-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vaultly-control-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultly-control-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                # SQL identifier — debe coincidir con DB_USER del secret.
                - -U
                - vaultly_control
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: vaultly-control-db-pvc
