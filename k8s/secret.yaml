apiVersion: v1
kind: Secret
metadata:
  name: vaultly-control-secret
  namespace: vaultly-control
type: Opaque
#
# To create from a real .env file:
#   kubectl create secret generic vaultly-control-secret \
#     --from-env-file=.env -n vaultly-control
#
# Or manually encode values:
#   echo -n "my-value" | base64
#
# NEVER commit real secret values to version control.
# For production, consider sealed-secrets or external-secrets-operator.
#
stringData:
  # SQL identifier sin guión (Postgres no permite '-' sin quotes).
  DB_USER: "vaultly_control"
  DB_PASSWORD: "changeme"
  R2_ACCESS_KEY_ID: ""
  R2_SECRET_ACCESS_KEY: ""
  # KEYCLOAK_CLIENT_SECRET: ""  # Uncomment if your Keycloak client requires a secret

